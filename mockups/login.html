<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In — ReviewMate</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,800;1,9..144,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--teal:#0d9488;--teal-light:#ccfbf1;--teal-dark:#134e4a;--teal-mid:#14b8a6;--black:#0c0f0a;--gray-900:#111827;--gray-600:#4b5563;--gray-400:#9ca3af;--gray-300:#d1d5db;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;color:var(--gray-900);background:#f0f4f3;min-height:100vh;display:flex;flex-direction:column;}
h2{font-family:'Fraunces',serif;}
nav{display:flex;align-items:center;justify-content:space-between;padding:18px 40px;background:var(--black);}
.logo{font-family:'Fraunces',serif;font-weight:700;font-size:20px;color:white;}
.logo em{color:var(--teal-mid);font-style:normal;}
.wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 24px;}
.card{background:white;border-radius:18px;padding:44px;width:100%;max-width:420px;box-shadow:0 4px 20px rgba(0,0,0,.07);border:1px solid #e5e7eb;}
.card-head{text-align:center;margin-bottom:32px;}
.card-head h2{font-size:28px;font-weight:800;color:var(--black);margin-bottom:6px;}
.card-head p{font-size:15px;color:var(--gray-600);}
.form-group{margin-bottom:18px;}
.form-group label{display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:500;color:var(--gray-900);margin-bottom:6px;}
.form-group label a{color:var(--teal);font-size:13px;}
input{width:100%;padding:12px 15px;border:1.5px solid var(--gray-300);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--gray-900);outline:none;transition:border-color .2s;}
input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(13,148,136,.1);}
input::placeholder{color:var(--gray-400);}
.btn{display:block;width:100%;padding:15px;background:var(--teal);color:white;border:none;border-radius:11px;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:500;cursor:pointer;text-align:center;text-decoration:none;transition:all .2s;}
.btn:hover{background:#0f766e;}
.foot{text-align:center;margin-top:20px;font-size:14px;color:var(--gray-600);}
.foot a{color:var(--teal);font-weight:500;}
</style>
</head>
<body>
<nav>
  <div class="logo">Review<em>Mate</em></div>
</nav>
<div class="wrap">
  <div class="card">
    <div class="card-head">
      <h2>Welcome back</h2>
      <p>Log in to your ReviewMate account</p>
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" placeholder="you@yourbusiness.com"/>
    </div>
    <div class="form-group">
      <label>Password <a href="#">Forgot password?</a></label>
      <input type="password" placeholder="Your password"/>
    </div>
    <a href="dashboard.html" class="btn">Log In →</a>
    <div class="foot">Don't have an account? <a href="signup.html">Start free trial</a></div>
  </div>
</div>
</body>
</html>
